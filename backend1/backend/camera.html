<!DOCTYPE html>
<html lang="en" class="bg-gray-950 text-gray-100">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Live Camera — Detection Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'alert-red': '#f87171',
                        'alert-amber': '#fbbf24',
                        'alert-green': '#34d399',
                    }
                }
            }
        }
    </script>
    <style>
        #video-container {
            image-rendering: crisp-edges;
            background: #000;
        }

        .alert-badge {
            animation: pulse 2.5s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: 0.75;
                transform: scale(1.03);
            }
        }

        .log-entry {
            transition: all 0.2s;
        }

        .log-entry:hover {
            background-color: rgba(55, 65, 81, 0.8);
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: #1f2937;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #4b5563;
            border-radius: 3px;
        }
    </style>
</head>

<body class="min-h-screen bg-gradient-to-b from-gray-950 via-gray-900 to-black">

    <div class="container mx-auto px-4 py-6 max-w-7xl">

        <!-- Header -->
        <div class="flex flex-col sm:flex-row justify-between items-center mb-6 gap-4">
            <h1 class="text-3xl md:text-4xl font-bold tracking-tight">
                Live Detection <span class="text-blue-400">· Camera Feed</span>
            </h1>
            <div class="flex items-center gap-4 flex-wrap">
                <select id="camera-select"
                    class="bg-gray-800 border border-gray-700 text-white rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="">Select Camera...</option>
                </select>
                <div id="connection-status"
                    class="px-3 py-1 rounded-full text-sm font-medium bg-gray-700 text-gray-300">
                    Connecting...
                </div>
                <button id="fullscreen-btn"
                    class="px-3 py-1.5 bg-gray-700 hover:bg-gray-600 rounded-md text-sm transition hidden">
                    ⛶ Fullscreen
                </button>
            </div>
        </div>

        <!-- Main content -->
        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">

            <!-- Video + Overlay -->
            <div class="lg:col-span-3 bg-black rounded-xl overflow-hidden shadow-2xl border border-gray-700 relative">
                <div id="video-container" class="relative aspect-video flex items-center justify-center">
                    <div id="loading-spinner"
                        class="absolute inset-0 flex items-center justify-center bg-black/60 z-10">
                        <div class="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin">
                        </div>
                    </div>
                    <img id="live-image" class="w-full h-full object-contain opacity-0 transition-opacity duration-300"
                        alt="Live camera stream" crossorigin="anonymous">

                    <!-- Alert overlay -->
                    <div id="alert-overlay"
                        class="absolute inset-0 pointer-events-none flex flex-col justify-between p-4 sm:p-6 opacity-0 transition-opacity duration-300">
                        <div id="top-alerts" class="flex flex-wrap gap-3"></div>
                        <div id="bottom-alerts" class="flex flex-wrap gap-3 justify-end"></div>
                    </div>
                </div>
                <div class="p-4 bg-gray-900/80 flex justify-between items-center text-sm">
                    <span id="current-camera-name" class="font-medium">No camera selected</span>
                    <span id="last-update" class="text-gray-400">Waiting for stream...</span>
                </div>
            </div>

            <!-- Sidebar – Detection Log -->
            <div
                class="bg-gray-900/70 backdrop-blur-sm rounded-xl border border-gray-700 p-5 flex flex-col h-[min(80vh,900px)]">
                <h2 class="text-xl font-semibold mb-4 pb-3 border-b border-gray-700">Detection Events</h2>
                <div id="alert-log" class="flex-1 overflow-y-auto space-y-3 custom-scrollbar pr-1 text-sm"></div>
            </div>

        </div>

    </div>

    <script>
        // ────────────────────────────────────────────────
        //  CONFIG
        // ────────────────────────────────────────────────
        const API_BASE = "http://172.20.82.120:5000/api";
        const WS_URL = "ws://172.27.3.47:5000/ws/live";

        // ────────────────────────────────────────────────
        //  Elements
        // ────────────────────────────────────────────────
        const cameraSelect = document.getElementById("camera-select");
        const liveImage = document.getElementById("live-image");
        const loadingSpinner = document.getElementById("loading-spinner");
        const connStatus = document.getElementById("connection-status");
        const currentCamName = document.getElementById("current-camera-name");
        const lastUpdate = document.getElementById("last-update");
        const topAlerts = document.getElementById("top-alerts");
        const bottomAlerts = document.getElementById("bottom-alerts");
        const alertOverlay = document.getElementById("alert-overlay");
        const logContainer = document.getElementById("alert-log");
        const fullscreenBtn = document.getElementById("fullscreen-btn");

        let ws = null;
        let reconnectTimer = null;
        let currentCameraId = null;
        let reconnectDelay = 3000;

        // ────────────────────────────────────────────────
        //  Load available cameras
        // ────────────────────────────────────────────────
        async function loadCameras() {
            try {
                const res = await fetch(`${API_BASE}/cameras`);
                if (!res.ok) throw new Error("Failed to load cameras");
                const cameras = await res.json();

                cameraSelect.innerHTML = '<option value="">Select Camera...</option>';

                cameras.forEach(cam => {
                    const opt = document.createElement("option");
                    opt.value = cam.id;
                    opt.textContent = cam.name || `Camera ${cam.camera_number || cam.id}`;
                    if (cam.status === "active") {
                        opt.classList.add("text-green-400");
                    }
                    cameraSelect.appendChild(opt);
                });

                if (currentCameraId) {
                    cameraSelect.value = currentCameraId;
                }
            } catch (err) {
                console.error("Failed to load cameras:", err);
                cameraSelect.innerHTML = '<option value="">Error loading cameras</option>';
            }
        }

        // ────────────────────────────────────────────────
        //  WebSocket connection
        // ────────────────────────────────────────────────
        function connectWebSocket() {
            if (ws) ws.close();

            ws = new WebSocket(WS_URL);

            ws.onopen = () => {
                connStatus.textContent = "Connected";
                connStatus.className = "px-3 py-1 rounded-full text-sm font-medium bg-green-900/40 text-green-400 border border-green-700/50";
                reconnectDelay = 3000;
            };

            ws.onclose = () => {
                connStatus.textContent = "Disconnected";
                connStatus.className = "px-3 py-1 rounded-full text-sm font-medium bg-red-900/40 text-red-400 border border-red-700/50";
                scheduleReconnect();
            };

            ws.onerror = (e) => {
                console.error("WS error:", e);
                connStatus.textContent = "Connection error";
            };

            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);

                    if (data.image) {
                        // Revoke previous URL to prevent memory leak
                        if (liveImage.src.startsWith("blob:")) {
                            URL.revokeObjectURL(liveImage.src);
                        }
                        liveImage.src = `data:image/jpeg;base64,${data.image}`;
                        liveImage.classList.remove("opacity-0");
                        liveImage.classList.add("opacity-100");
                        loadingSpinner.classList.add("hidden");
                        lastUpdate.textContent = `Last frame: ${new Date().toLocaleTimeString()}`;
                    }

                    if (data.alerts) {
                        updateAlerts(data.alerts);
                    }

                } catch (err) {
                    console.error("Invalid WS message:", err);
                }
            };
        }

        function scheduleReconnect() {
            clearTimeout(reconnectTimer);
            reconnectTimer = setTimeout(() => {
                connectWebSocket();
                reconnectDelay = Math.min(reconnectDelay * 1.5, 30000); // exponential backoff max 30s
            }, reconnectDelay);
        }

        // ────────────────────────────────────────────────
        //  Alerts & Log
        // ────────────────────────────────────────────────
        function updateAlerts(alerts) {
            topAlerts.innerHTML = "";
            bottomAlerts.innerHTML = "";

            if (!alerts?.length) {
                alertOverlay.style.opacity = "0";
                return;
            }

            alertOverlay.style.opacity = "1";

            alerts.forEach(text => {
                const isCritical = /weapon|gun|knife|firearm/i.test(text);
                const color = isCritical ? "alert-red" : "alert-amber";

                const badge = document.createElement("div");
                badge.className = `px-4 py-2 rounded-full text-sm font-medium bg-${color}/25 text-${color} border border-${color}/40 backdrop-blur-sm alert-badge shadow-sm`;
                badge.textContent = text;

                (isCritical ? topAlerts : bottomAlerts).appendChild(badge);

                addToLog(text, isCritical);
            });
        }

        function addToLog(message, isCritical = false) {
            const entry = document.createElement("div");
            entry.className = `p-3 rounded-lg border ${isCritical ? "border-red-700/50 bg-red-950/30" : "border-gray-700 bg-gray-800/50"} log-entry`;
            entry.innerHTML = `
        <div class="text-xs text-gray-400 mb-1">${new Date().toLocaleString([], { hour12: true })}</div>
        ${message}
      `;
            logContainer.prepend(entry);

            if (logContainer.children.length > 40) {
                logContainer.removeChild(logContainer.lastChild);
            }
        }

        // ────────────────────────────────────────────────
        //  Fullscreen toggle
        // ────────────────────────────────────────────────
        const videoContainer = document.getElementById("video-container").parentElement;
        fullscreenBtn.onclick = () => {
            if (!document.fullscreenElement) {
                videoContainer.requestFullscreen().catch(e => console.error(e));
            } else {
                document.exitFullscreen();
            }
        };

        document.addEventListener("fullscreenchange", () => {
            fullscreenBtn.classList.toggle("hidden", !document.fullscreenElement);
        });

        // ────────────────────────────────────────────────
        //  Camera selection & stream start
        // ────────────────────────────────────────────────
        cameraSelect.addEventListener("change", async (e) => {
            const cameraId = e.target.value;
            if (!cameraId) return;

            currentCameraId = cameraId;
            currentCamName.textContent = e.target.options[e.target.selectedIndex].text;
            loadingSpinner.classList.remove("hidden");
            liveImage.classList.add("opacity-0");

            try {
                const res = await fetch(`${API_BASE}/cameras/${cameraId}/stream`);
                const data = await res.json();

                if (data.status === "success") {
                    lastUpdate.textContent = `Stream started (${data.source || "active"})`;
                } else {
                    lastUpdate.textContent = data.message || "Failed to start stream";
                }
            } catch (err) {
                console.error("Stream start failed:", err);
                lastUpdate.textContent = "Connection error";
            }
        });

        // ────────────────────────────────────────────────
        //  Initialization
        // ────────────────────────────────────────────────
        loadCameras();
        connectWebSocket();

        // Auto-refresh camera list every 30 seconds
        setInterval(loadCameras, 30000);
    </script>
</body>

</html>
